# Contains local system settings for Portage system

# Please review 'man make.conf' for more information.

# ==== Environment Variabels ====
# PATH=
# ROOTPATH=
# LDPATH=
# MANPATH=
# INFODIR=
PAGER="less"
EDITOR="vim"
# CONFIG_PROTECT=
# CONFIG_PROTECT_MASK=


# ==== Compiler and optimization settings ====
COMMON_FLAGS="-march=native -O2 -pipe" #x86-64
CFLAGS="${COMMON_FLAGS}"
CXXFLAGS="${COMMON_FLAGS}"
FCFLAGS="${COMMON_FLAGS}"
FFLAGS="${COMMON_FLAGS}"

# ==== CPU Flags ====
CPU_FLAGS_X86="aes avx avx2 bmi1 bmi2 f16c fma3 mmx mmxext pclmul \
popcnt rdrand sse sse2 sse3 sse4_1 sse4_2 ssse3"

# Pacote para obter as flags:
# app-portage/cpuid2cpuflags

MAKEOPTS="-j2 -l2" # O recomendado é pelo menos 2GB de RAM por Job.

# ==== Portage performance ====
PORTAGE_NICENESS=0 # Vai de -20 até 19, quanto menor o valor maior a prioridade no sistema.
EMERGE_DEFAULT_OPTS="--jobs=2 --load-average=2" # O recomendado é pelo menos 2GB de RAM por Job.

# ==== Features ====
FEATURES="binpkg-logs buildpkg protect-owned downgrade-backup \
ipc-sandbox network-sandbox parallel-install sign"

# ==== Architecture ====
ACCEPT_KEYWORDS="amd64"

# ==== Graphics ====
VIDEO_CARDS="intel" # virtualbox vesa
#  lspci | grep -E "VGA|3D" use para descobrir a sua.
# Pra mais detalhes use o:
# gcc -march=native -### -E - </dev/null 2>&1 | grep march
# Pegue a arquitetura "-march=?"
# Verifique na págica de videocard da wiki

# ==== Input devices ====
INPUT_DEVICES="libinput" # wacom caso necessário.

# ==== Languages ====
LINGUAS="pt_BR en"
L10N="pt-BR en"

# ==== Global USE flags ====
USE="systemd X opengl vulkan cups \
	pipewire alsa" # virtualbox guest additions

# ==== Repositories and mirrors ====
PORTAGE_TMPDIR="/var/tmp"
PORTDIR="/var/db/repos/gentoo"
DISTDIR="/var/cache/distfiles"
PKGDIR="/var/cache/binpkgs"

GENTOO_MIRRORS="https://gentoo.c3sl.ufpr.br/ https://br.mirrors.cicku.me/gentoo/ https://umbriel.br.ext.planetunix.net/pub/gentoo/"

PORTAGE_REPO_DUPLICATE_WARN="0"

# ==== Locale and misc ====
LC_MESSAGES=C
GRUB_PLATFORM="efi-64"

# ==== Licences ====
ACCEPT_LICENSE="*" 
# Isso permite todas, alterar para * -@EULA que permite tudo, 
# menos proprietario. Ou -* @FREE que só aceita os livres,
# caso um pacote precise ele vai lançar um erro e eu resolvo manualmente.
# Atráves do /etc/portage/package.license/
# escrevo pacote + licença, exemplo: sys-kernel/linux-firmware linux-fw-redistributable

# @GPL-COMPATIBLE	GPL compatible licenses approved by the Free Software Foundation 
# @FSF-APPROVED	Free software licenses approved by the FSF (includes @GPL-COMPATIBLE)
# @OSI-APPROVED	Licenses approved by the Open Source Initiative
# @MISC-FREE	Misc licenses that are probably free software, i.e. follow the Free Software Definition but are not approved by either FSF or OSI
# @FREE-SOFTWARE	Combines @FSF-APPROVED, @OSI-APPROVED, and @MISC-FREE.
# @FSF-APPROVED-OTHER	FSF-approved licenses for "free documentation" and "works of practical use besides software and documentation" (including fonts)
# @MISC-FREE-DOCS	Misc licenses for free documents and other works (including fonts) that follow the free definition but are NOT listed in @FSF-APPROVED-OTHER.
# @FREE-DOCUMENTS	Combines @FSF-APPROVED-OTHER and @MISC-FREE-DOCS.
# @FREE	Metaset of all licenses with the freedom to use, share, modify and share modifications. Combines @FREE-SOFTWARE and @FREE-DOCUMENTS.
# @BINARY-REDISTRIBUTABLE	Licenses that at least permit free redistribution of the software in binary form. Includes @FREE.
# @EULA	License agreements that try to take away your rights. These are more restrictive than "all-rights-reserved" or require explicit approval